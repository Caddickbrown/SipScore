<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2744">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="apple-touch-icon" href="/icons/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SipScore">
  <title>SipScore — My Reviews</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <a href="/drinks.html" class="app-logo">Sip<span>Score</span></a>
    <div class="header-right">
      <div class="user-avatar" id="headerAvatar" title="Profile"></div>
    </div>
  </header>

  <!-- Sort + filter bar -->
  <div class="filter-chips-wrap" style="top: var(--header-height);">
    <div class="filter-chips" id="categoryChips">
      <button class="chip active" data-cat="">All</button>
      <button class="chip" data-cat="wine">Wine</button>
      <button class="chip" data-cat="cocktail">Cocktail</button>
      <button class="chip" data-cat="beer">Beer</button>
      <button class="chip" data-cat="cider">Cider</button>
      <button class="chip" data-cat="spirit">Spirit</button>
      <button class="chip" data-cat="mocktail">Mocktail</button>
    </div>
  </div>

  <!-- Sort control -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 4px;">
    <span id="reviewCount" style="font-size:0.8rem;color:var(--text-light);"></span>
    <select id="sortSelect" class="sort-select">
      <option value="date">Most Recent</option>
      <option value="stars_desc">Highest Rated</option>
      <option value="stars_asc">Lowest Rated</option>
      <option value="name">A–Z</option>
    </select>
  </div>

  <!-- Reviews list -->
  <div id="reviewsList" class="reviews-list">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav" id="bottomNav">
    <a href="/drinks.html" class="nav-item" data-page="drinks">
      <svg viewBox="0 0 24 24"><path d="M8 22h8M12 11v11M7 3h10l-2 8H9L7 3z"/></svg>
      <span class="nav-label">Drinks</span>
    </a>
    <a href="/leaderboard.html" class="nav-item" data-page="leaderboard">
      <svg viewBox="0 0 24 24"><path d="M6 9H3l2-5h14l2 5h-3M6 9a6 6 0 0 0 12 0M8 21H5l3-3h8l3 3h-3M12 18v-3"/></svg>
      <span class="nav-label">Rankings</span>
    </a>
    <button type="button" class="nav-item" data-page="profile" onclick="App.openProfileModal(App.getUser())">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
      <span class="nav-label">Profile</span>
    </button>
  </nav>

  <!-- Profile modal -->
  <div class="modal-overlay" id="profileModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="profile-row">
        <div class="profile-avatar-lg"></div>
        <div class="profile-text-info">
          <div class="profile-display-name"></div>
          <div class="profile-stats-text">Loading…</div>
        </div>
      </div>
      <div class="modal-divider"></div>
      <nav class="modal-nav">
        <a href="/my-reviews.html" class="modal-nav-item">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          My Reviews
        </a>
        <a href="/add-drink.html" class="modal-nav-item">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
          Add Drink
        </a>
      </nav>
      <div class="modal-divider"></div>
      <div class="modal-actions">
        <button class="btn btn-outline btn-full" onclick="App.closeProfileModal()">Close</button>
        <button class="btn btn-danger btn-full" id="logoutBtn">Sign Out</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/my-reviews.js"></script>
</body>
</html>
