<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2744">
  <title>SipScore — Edit Drink</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="no-nav">

  <!-- Header with back button -->
  <div class="drink-hero" id="drinkHero" style="padding-bottom: 20px;">
    <a href="#" class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
      Back
    </a>
    <div class="drink-hero-badge" id="heroBadge"></div>
    <div class="drink-hero-title" id="heroTitle">Loading…</div>
  </div>

  <div class="px-14 mt-14" id="editForm" style="display:none;">

    <!-- Category toggle -->
    <div class="form-section">
      <h3>Category</h3>
      <div class="category-grid">
        <button type="button" class="category-btn" id="catWine" onclick="setCategory('wine')">
          <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5" viewBox="0 0 24 24"><path d="M8 22h8M12 11v11M7 3h10l-2 8H9L7 3z"/></svg>
          Wine
        </button>
        <button type="button" class="category-btn" id="catCocktail" onclick="setCategory('cocktail')">
          <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5" viewBox="0 0 24 24"><path d="M8 3h8l-4 9M4 3h16M12 12v9M8 21h8"/></svg>
          Cocktail
        </button>
        <button type="button" class="category-btn" id="catBeer" onclick="setCategory('beer')">
          <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5" viewBox="0 0 24 24"><path d="M5 8h2l1 12h8l1-12h2M5 8V6h14v2M9 4h6"/></svg>
          Beer
        </button>
        <button type="button" class="category-btn" id="catCider" onclick="setCategory('cider')">
          <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5" viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 1 5 5c0 4-5 8-5 8S7 11 7 7a5 5 0 0 1 5-5z"/><path d="M8 20h8M10 20v-4h4v4"/></svg>
          Cider
        </button>
        <button type="button" class="category-btn" id="catSpirit" onclick="setCategory('spirit')">
          <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5" viewBox="0 0 24 24"><path d="M9 3h6l1 5H8L9 3zM8 8l-2 13h12L16 8"/></svg>
          Spirit
        </button>
        <button type="button" class="category-btn" id="catMocktail" onclick="setCategory('mocktail')">
          <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8"/></svg>
          Mocktail
        </button>
        <button type="button" class="category-btn" id="catHotdrink" onclick="setCategory('hotdrink')">
          <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5" viewBox="0 0 24 24"><path d="M17 8h1a4 4 0 0 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
          Hot Drink
        </button>
        <button type="button" class="category-btn" id="catSoftdrink" onclick="setCategory('softdrink')">
          <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5" viewBox="0 0 24 24"><path d="M8 2h8l1 6H7L8 2z"/><path d="M7 8l-1 13h12L17 8"/><path d="M10 12h4"/></svg>
          Soft Drink
        </button>
        <button type="button" class="category-btn" id="catMilkshake" onclick="setCategory('milkshake')">
          <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5" viewBox="0 0 24 24"><path d="M8 3h8l1 4H7L8 3z"/><path d="M7 7l1 14h8l1-14"/><path d="M10 11c0 2 4 2 4 4s-4 2-4 4"/></svg>
          Milkshake
        </button>
      </div>
    </div>

    <!-- Form -->
    <div class="form-section">
      <form id="editDrinkForm" onsubmit="handleEdit(event)">

        <div class="form-group">
          <label class="form-label" for="drinkName">Drink Name</label>
          <input
            class="form-input"
            type="text"
            id="drinkName"
            autocapitalize="words"
            maxlength="150"
            required
          >
        </div>

        <!-- Wine fields -->
        <div id="wineFields">
          <div class="form-group">
            <label class="form-label" for="wineType">Type</label>
            <select class="form-select" id="wineType">
              <option value="">Select type…</option>
              <option value="White">White</option>
              <option value="Rosé">Rosé</option>
              <option value="Red">Red</option>
              <option value="Sparkling">Sparkling</option>
              <option value="Dessert and Fortified">Dessert &amp; Fortified</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="wineVarietal">Grape Varietal</label>
            <input class="form-input" type="text" id="wineVarietal" placeholder="e.g. Malbec, Chardonnay" autocapitalize="words" maxlength="100">
          </div>
          <div class="form-group">
            <label class="form-label" for="wineStyle">Style</label>
            <select class="form-select" id="wineStyle">
              <option value="">Select style…</option>
              <option value="Light and Crisp">Light and Crisp</option>
              <option value="Juicy and Aromatic">Juicy and Aromatic</option>
              <option value="Full and Opulent">Full and Opulent</option>
              <option value="Fruity and Lively">Fruity and Lively</option>
              <option value="Ripe and Smooth">Ripe and Smooth</option>
              <option value="Rich and Dense">Rich and Dense</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="wineSource">Region / Origin</label>
            <input class="form-input" type="text" id="wineSource" placeholder="e.g. Corfu, Greece" autocapitalize="words" maxlength="100">
          </div>
        </div>

        <!-- Beer fields -->
        <div id="beerFields" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="beerType">Style</label>
            <select class="form-select" id="beerType">
              <option value="">Select style…</option>
              <option value="Lager">Lager</option>
              <option value="Ale">Ale</option>
              <option value="IPA">IPA</option>
              <option value="Stout">Stout</option>
              <option value="Wheat Beer">Wheat Beer</option>
              <option value="Pilsner">Pilsner</option>
              <option value="Porter">Porter</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="beerSource">Brewery / Origin</label>
            <input class="form-input" type="text" id="beerSource" placeholder="e.g. Mythos, Greece" autocapitalize="words" maxlength="100">
          </div>
        </div>

        <!-- Cider fields -->
        <div id="ciderFields" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="ciderType">Sweetness</label>
            <select class="form-select" id="ciderType">
              <option value="">Select sweetness…</option>
              <option value="Dry">Dry</option>
              <option value="Medium Dry">Medium Dry</option>
              <option value="Medium">Medium</option>
              <option value="Sweet">Sweet</option>
              <option value="Rosé">Rosé</option>
              <option value="Sparkling">Sparkling</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="ciderSource">Producer / Origin</label>
            <input class="form-input" type="text" id="ciderSource" placeholder="e.g. Rekorderlig, Sweden" autocapitalize="words" maxlength="100">
          </div>
        </div>

        <!-- Spirit fields -->
        <div id="spiritFields" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="spiritType">Spirit Type</label>
            <select class="form-select" id="spiritType">
              <option value="">Select type…</option>
              <option value="Vodka">Vodka</option>
              <option value="Gin">Gin</option>
              <option value="Rum">Rum</option>
              <option value="Tequila">Tequila</option>
              <option value="Whiskey">Whiskey</option>
              <option value="Brandy">Brandy</option>
              <option value="Ouzo">Ouzo</option>
              <option value="Grappa">Grappa</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="spiritStyle">Serve Style</label>
            <select class="form-select" id="spiritStyle">
              <option value="">Select serve…</option>
              <option value="Neat">Neat</option>
              <option value="On the Rocks">On the Rocks</option>
              <option value="Mixed">Mixed</option>
              <option value="Shot">Shot</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="spiritSource">Distillery / Origin</label>
            <input class="form-input" type="text" id="spiritSource" placeholder="e.g. Metaxa, Greece" autocapitalize="words" maxlength="100">
          </div>
        </div>

        <!-- Mocktail fields -->
        <div id="mocktailFields" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="mocktailType">Type</label>
            <select class="form-select" id="mocktailType">
              <option value="">Select type…</option>
              <option value="Fruit-based">Fruit-based</option>
              <option value="Herbal">Herbal</option>
              <option value="Sparkling">Sparkling</option>
              <option value="Tropical">Tropical</option>
              <option value="Creamy">Creamy</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="mocktailStyle">Style</label>
            <select class="form-select" id="mocktailStyle">
              <option value="">Select style…</option>
              <option value="Refreshing">Refreshing</option>
              <option value="Sweet">Sweet</option>
              <option value="Sour">Sour</option>
              <option value="Fruity">Fruity</option>
              <option value="Creamy">Creamy</option>
            </select>
          </div>
        </div>

        <!-- Cocktail fields -->
        <div id="cocktailFields" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="cocktailType">Base Spirit</label>
            <select class="form-select" id="cocktailType">
              <option value="">Select base…</option>
              <option value="Rum-based">Rum-based</option>
              <option value="Vodka-based">Vodka-based</option>
              <option value="Gin-based">Gin-based</option>
              <option value="Tequila-based">Tequila-based</option>
              <option value="Whiskey-based">Whiskey-based</option>
              <option value="Wine-based">Wine-based</option>
              <option value="Mixed">Mixed</option>
              <option value="Non-alcoholic">Non-alcoholic</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="cocktailStyle">Style</label>
            <select class="form-select" id="cocktailStyle">
              <option value="">Select style…</option>
              <option value="Refreshing">Refreshing</option>
              <option value="Sweet">Sweet</option>
              <option value="Sour">Sour</option>
              <option value="Sweet &amp; Tart">Sweet &amp; Tart</option>
              <option value="Bitter">Bitter</option>
              <option value="Tropical">Tropical</option>
              <option value="Bubbly">Bubbly</option>
              <option value="Rich">Rich</option>
              <option value="Fruity">Fruity</option>
              <option value="Classic">Classic</option>
              <option value="Strong">Strong</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="cocktailSource">Origin (optional)</label>
            <input class="form-input" type="text" id="cocktailSource" placeholder="e.g. Cuba or Italy" autocapitalize="words" maxlength="100">
          </div>
        </div>

        <!-- Hot Drink fields -->
        <div id="hotdrinkFields" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="hotdrinkType">Type</label>
            <select class="form-select" id="hotdrinkType">
              <option value="">Select type…</option>
              <optgroup label="Coffee">
                <option value="Espresso">Espresso</option>
                <option value="Latte">Latte</option>
                <option value="Cappuccino">Cappuccino</option>
                <option value="Flat White">Flat White</option>
                <option value="Americano">Americano</option>
                <option value="Cold Brew">Cold Brew</option>
                <option value="Iced Coffee">Iced Coffee</option>
                <option value="Mocha">Mocha</option>
              </optgroup>
              <optgroup label="Tea">
                <option value="Black Tea">Black Tea</option>
                <option value="Green Tea">Green Tea</option>
                <option value="Herbal Tea">Herbal Tea</option>
                <option value="Chai">Chai</option>
              </optgroup>
              <optgroup label="Other">
                <option value="Hot Chocolate">Hot Chocolate</option>
                <option value="Other">Other</option>
              </optgroup>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="hotdrinkStyle">Style</label>
            <select class="form-select" id="hotdrinkStyle">
              <option value="">Select style…</option>
              <option value="Black">Black</option>
              <option value="Milky">Milky</option>
              <option value="Sweet">Sweet</option>
              <option value="Iced">Iced</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="hotdrinkSource">Café / Origin</label>
            <input class="form-input" type="text" id="hotdrinkSource" placeholder="e.g. Costa, Colombia" autocapitalize="words" maxlength="100">
          </div>
        </div>

        <!-- Soft Drink fields -->
        <div id="softdrinkFields" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="softdrinkType">Type</label>
            <select class="form-select" id="softdrinkType">
              <option value="">Select type…</option>
              <option value="Cola">Cola</option>
              <option value="Lemonade">Lemonade</option>
              <option value="Juice">Juice</option>
              <option value="Energy Drink">Energy Drink</option>
              <option value="Sparkling Water">Sparkling Water</option>
              <option value="Iced Tea">Iced Tea</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="softdrinkSource">Brand / Origin</label>
            <input class="form-input" type="text" id="softdrinkSource" placeholder="e.g. Coca-Cola, San Pellegrino" autocapitalize="words" maxlength="100">
          </div>
        </div>

        <!-- Milkshake fields -->
        <div id="milkshakeFields" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="milkshakeType">Type</label>
            <select class="form-select" id="milkshakeType">
              <option value="">Select type…</option>
              <option value="Classic">Classic</option>
              <option value="Smoothie">Smoothie</option>
              <option value="Thick Shake">Thick Shake</option>
              <option value="Frappe">Frappe</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="milkshakeStyle">Flavour</label>
            <select class="form-select" id="milkshakeStyle">
              <option value="">Select flavour…</option>
              <option value="Fruity">Fruity</option>
              <option value="Chocolatey">Chocolatey</option>
              <option value="Vanilla">Vanilla</option>
              <option value="Nutty">Nutty</option>
              <option value="Creamy">Creamy</option>
            </select>
          </div>
        </div>

        <div class="form-error" id="editError"></div>

        <button type="submit" class="btn btn-gold btn-full" id="saveBtn">
          Save Changes
        </button>

      </form>
    </div>

  </div>

  <div id="toast"></div>

  <script src="/js/app.js"></script>
  <script src="/js/edit-drink.js"></script>
</body>
</html>
