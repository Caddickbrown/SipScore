<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2744">
  <title>SipScore</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { padding-bottom: 0; }
  </style>
</head>
<body class="no-nav">

  <div class="login-page">
    <div class="login-hero">
      <div class="login-logo">SipScore</div>
      <div class="login-tagline">Your holiday drinks companion</div>
      <div class="login-ikos">Ikos Resorts</div>
    </div>

    <div class="login-card">
      <p class="login-card-title">Welcome</p>

      <!-- Tab switcher -->
      <div class="login-tabs">
        <button class="login-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="login-tab" id="tabRegister" onclick="switchTab('register')">New Profile</button>
      </div>

      <form id="authForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label class="form-label" for="nameInput">Your Name</label>
          <input
            class="form-input"
            type="text"
            id="nameInput"
            placeholder="e.g. Alex or Smith Family"
            autocomplete="off"
            autocapitalize="words"
            maxlength="30"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">4-Digit PIN</label>
          <div class="pin-row">
            <input class="pin-digit" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" id="p1">
            <input class="pin-digit" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" id="p2">
            <input class="pin-digit" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" id="p3">
            <input class="pin-digit" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" id="p4">
          </div>
          <p class="form-hint" id="pinHint">Choose a PIN you'll remember</p>
        </div>

        <p class="form-error" id="errorMsg"></p>

        <button type="submit" class="btn btn-gold btn-full" id="submitBtn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script src="/js/app.js"></script>
  <script>
    let currentTab = 'login';

    // If already logged in, go straight to drinks
    (function () {
      const user = App.getUser();
      if (user) window.location.replace('/drinks.html');
    })();

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('submitBtn').textContent = tab === 'login' ? 'Sign In' : 'Create Profile';
      document.getElementById('pinHint').textContent =
        tab === 'login' ? 'Enter your PIN' : 'Choose a PIN you\'ll remember';
      clearError();
      clearPin();
    }

    function clearError() {
      document.getElementById('errorMsg').textContent = '';
    }

    function clearPin() {
      ['p1','p2','p3','p4'].forEach(id => { document.getElementById(id).value = ''; });
    }

    function getPin() {
      return ['p1','p2','p3','p4'].map(id => document.getElementById(id).value).join('');
    }

    // PIN digit navigation
    ['p1','p2','p3','p4'].forEach((id, i) => {
      const el = document.getElementById(id);
      el.addEventListener('input', () => {
        el.value = el.value.replace(/\D/g, '').slice(-1);
        if (el.value && i < 3) {
          document.getElementById(['p1','p2','p3','p4'][i + 1]).focus();
        }
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !el.value && i > 0) {
          document.getElementById(['p1','p2','p3','p4'][i - 1]).focus();
        }
      });
    });

    async function handleSubmit(e) {
      e.preventDefault();
      clearError();

      const name = document.getElementById('nameInput').value.trim();
      const pin = getPin();

      if (!name) {
        document.getElementById('errorMsg').textContent = 'Please enter your name';
        return;
      }

      if (pin.length !== 4) {
        document.getElementById('errorMsg').textContent = 'Please enter all 4 PIN digits';
        document.getElementById('p1').focus();
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = currentTab === 'login' ? 'Signing in…' : 'Creating profile…';

      try {
        const data = await App.apiFetch('/api/auth', {
          method: 'POST',
          body: JSON.stringify({ action: currentTab, name, pin }),
        });

        App.setUser(data.user);
        window.location.replace('/drinks.html');
      } catch (err) {
        document.getElementById('errorMsg').textContent = err.message;
        btn.disabled = false;
        btn.textContent = currentTab === 'login' ? 'Sign In' : 'Create Profile';
        clearPin();
        document.getElementById('p1').focus();
      }
    }
  </script>
</body>
</html>
