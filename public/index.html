<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2744">
  <title>SipScore</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="no-nav">

  <div class="login-page">
    <div class="login-hero">
      <div class="login-logo">SipScore</div>
      <div class="login-tagline">Your holiday drinks companion</div>
      <div class="login-ikos">Ikos Resorts</div>
    </div>

    <div class="login-card">
      <p class="login-card-title">Welcome</p>

      <form id="authForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label class="form-label" for="nameInput">Your Name</label>
          <input
            class="form-input"
            type="text"
            id="nameInput"
            placeholder="e.g. Alex or Smith Family"
            autocomplete="off"
            autocapitalize="words"
            maxlength="30"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">4-Digit PIN</label>
          <div class="pin-row">
            <input class="pin-digit" type="password" maxlength="1" pattern="[0-9]" inputmode="numeric" id="p1" autocomplete="off">
            <input class="pin-digit" type="password" maxlength="1" pattern="[0-9]" inputmode="numeric" id="p2" autocomplete="off">
            <input class="pin-digit" type="password" maxlength="1" pattern="[0-9]" inputmode="numeric" id="p3" autocomplete="off">
            <input class="pin-digit" type="password" maxlength="1" pattern="[0-9]" inputmode="numeric" id="p4" autocomplete="off">
          </div>
          <p class="form-hint">Your PIN keeps your ratings private</p>
        </div>

        <p class="form-error" id="errorMsg"></p>

        <button type="submit" class="btn btn-gold btn-full" id="submitBtn">
          Continue
        </button>
      </form>
    </div>
  </div>

  <!-- New-profile confirmation sheet -->
  <div class="modal-overlay" id="newProfileModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--navy);margin-bottom:10px;">New profile?</h3>
      <p style="font-size:0.9rem;color:var(--slate);margin-bottom:22px;font-weight:300;" id="newProfileMsg"></p>
      <div class="modal-actions">
        <button class="btn btn-gold btn-full" id="confirmYesBtn">Yes, create my profile</button>
        <button class="btn btn-outline btn-full" onclick="closeNewProfileModal()">No, try a different name</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="/js/app.js"></script>
  <script>
    // If already logged in, go straight to drinks
    (function () {
      if (App.getUser()) window.location.replace('/drinks.html');
    })();

    function clearError() {
      document.getElementById('errorMsg').textContent = '';
    }

    function clearPin() {
      ['p1','p2','p3','p4'].forEach(id => { document.getElementById(id).value = ''; });
    }

    function getPin() {
      return ['p1','p2','p3','p4'].map(id => document.getElementById(id).value).join('');
    }

    function resetBtn() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.textContent = 'Continue';
    }

    // PIN digit auto-advance and backspace
    ['p1','p2','p3','p4'].forEach((id, i) => {
      const el = document.getElementById(id);
      el.addEventListener('input', () => {
        el.value = el.value.replace(/\D/g, '').slice(-1);
        if (el.value && i < 3) document.getElementById(['p1','p2','p3','p4'][i + 1]).focus();
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !el.value && i > 0) document.getElementById(['p1','p2','p3','p4'][i - 1]).focus();
      });
    });

    async function handleSubmit(e) {
      e.preventDefault();
      clearError();

      const name = document.getElementById('nameInput').value.trim();
      const pin  = getPin();

      if (!name) { document.getElementById('errorMsg').textContent = 'Please enter your name'; return; }
      if (pin.length !== 4) { document.getElementById('errorMsg').textContent = 'Please enter all 4 PIN digits'; document.getElementById('p1').focus(); return; }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Checking\u2026';

      try {
        // Always try login first
        const data = await App.apiFetch('/api/auth', {
          method: 'POST',
          body: JSON.stringify({ action: 'login', name, pin }),
        });
        App.setUser(data.user);
        window.location.replace('/drinks.html');
      } catch (err) {
        if (err.message && err.message.toLowerCase().includes('no profile found')) {
          // Name doesn't exist — offer to create one
          resetBtn();
          openNewProfileModal(name, pin);
        } else {
          // Wrong PIN or other error
          document.getElementById('errorMsg').textContent = err.message;
          resetBtn();
          clearPin();
          document.getElementById('p1').focus();
        }
      }
    }

    // ---- New profile modal ----
    let pendingName = '';
    let pendingPin  = '';

    function openNewProfileModal(name, pin) {
      pendingName = name;
      pendingPin  = pin;
      document.getElementById('newProfileMsg').textContent =
        '\u201c' + name + '\u201d isn\u2019t registered yet. Would you like to create a new profile?';
      const overlay = document.getElementById('newProfileModal');
      overlay.classList.add('visible');
      document.body.style.overflow = 'hidden';
    }

    function closeNewProfileModal() {
      document.getElementById('newProfileModal').classList.remove('visible');
      document.body.style.overflow = '';
      pendingName = '';
      pendingPin  = '';
      document.getElementById('nameInput').focus();
    }

    document.getElementById('newProfileModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('newProfileModal')) closeNewProfileModal();
    });

    document.getElementById('confirmYesBtn').addEventListener('click', async () => {
      const btn = document.getElementById('confirmYesBtn');
      btn.disabled = true;
      btn.textContent = 'Creating\u2026';

      try {
        const data = await App.apiFetch('/api/auth', {
          method: 'POST',
          body: JSON.stringify({ action: 'register', name: pendingName, pin: pendingPin }),
        });
        App.setUser(data.user);
        window.location.replace('/drinks.html');
      } catch (err) {
        document.getElementById('newProfileModal').classList.remove('visible');
        document.body.style.overflow = '';
        document.getElementById('errorMsg').textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Yes, create my profile';
      }
    });
  </script>
</body>
</html>
