<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Navy rounded square background (iOS squircle-style) -->
  <rect width="180" height="180" rx="40" fill="#1a2744"/>

  <!-- Martini glass bowl (wide V) -->
  <polygon points="26,46 154,46 90,110" fill="#c9a96e"/>

  <!-- Stem -->
  <rect x="87" y="110" width="6" height="30" fill="#c9a96e"/>

  <!-- Base -->
  <rect x="58" y="140" width="64" height="8" rx="4" fill="#c9a96e"/>

  <!-- Olive stick (diagonal across glass rim) -->
  <line x1="97" y1="70" x2="144" y2="46" stroke="#c9a96e" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Olive -->
  <circle cx="148" cy="44" r="9" fill="#c9a96e"/>
  <!-- Pimento -->
  <circle cx="148" cy="44" r="4" fill="#1a2744"/>
</svg>
