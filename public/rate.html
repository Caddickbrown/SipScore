<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2744">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="apple-touch-icon" href="/icons/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SipScore">
  <title>SipScore — Rate</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { padding-bottom: 24px; }
  </style>
</head>
<body class="no-nav">

  <!-- Drink hero header -->
  <div class="drink-hero" id="drinkHero">
    <a href="/drinks.html" class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
      <span id="backLabel">All Drinks</span>
    </a>
    <div class="drink-hero-badge" id="heroBadge"></div>
    <div class="drink-hero-title" id="heroTitle">Loading…</div>
    <div class="drink-hero-meta" id="heroMeta"></div>
  </div>

  <!-- Edit drink info link -->
  <div id="editDrinkWrap" style="display:none;padding:10px 16px 0;">
    <a id="editDrinkLink" href="#" class="btn btn-ghost btn-full" style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:0.82rem;">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit Drink Info
    </a>
  </div>

  <!-- Your rating card -->
  <div class="rating-card" id="ratingCard">
    <h3>Your Rating</h3>

    <div class="star-rating-input" id="starInput">
      <button type="button" class="star-btn" data-val="1">&#9733;</button>
      <button type="button" class="star-btn" data-val="2">&#9733;</button>
      <button type="button" class="star-btn" data-val="3">&#9733;</button>
      <button type="button" class="star-btn" data-val="4">&#9733;</button>
      <button type="button" class="star-btn" data-val="5">&#9733;</button>
    </div>
    <div class="star-label-text" id="starLabel">Tap a star to rate</div>

    <label class="notes-label" for="notesInput">Tasting Notes <span style="font-weight:300;font-style:italic">(optional)</span></label>
    <textarea
      class="notes-textarea"
      id="notesInput"
      placeholder="What did you think? Crisp and refreshing? Sweet? Pairs well with the sea view?"
      rows="3"
    ></textarea>

    <button class="btn btn-gold btn-full" id="saveBtn" onclick="saveRating()" disabled>
      Save Rating
    </button>

    <button class="btn btn-ghost btn-full mt-8" id="deleteBtn" style="display:none;" onclick="deleteRating()">
      Remove My Rating
    </button>
  </div>

  <!-- Community ratings -->
  <div class="community-card" id="communityCard" style="display:none;">
    <h3>What Everyone Thinks</h3>

    <div class="community-avg-row" id="communityAvg"></div>

    <div id="communityRatings"></div>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/rate.js"></script>
</body>
</html>
